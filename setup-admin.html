<!DOCTYPE html>
<html>

<head>
  <title>Foova Admin Setup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      background: #0f0f0f;
      color: #fff;
    }

    h2 {
      color: #f59e0b;
    }

    button {
      background: #f59e0b;
      color: #000;
      border: none;
      padding: 14px 28px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:hover {
      background: #d97706;
    }

    #log {
      margin-top: 20px;
      padding: 16px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .ok {
      color: #4ade80;
    }

    .err {
      color: #f87171;
    }

    .info {
      color: #60a5fa;
    }
  </style>
</head>

<body>
  <h2>🔧 Foova Admin Setup</h2>
  <p>This will create the admin account and assign admin role.</p>
  <button onclick="setup()">▶ Create Admin Account</button>
  <div id="log">Ready. Click the button above.</div>

  <script>
    const SUPABASE_URL = "https://xvltvikvxbavybnkawgp.supabase.co";
    const SUPABASE_KEY = "sb_publishable_IuuD01jS1VYIASrSsu3mNw_E-OZsFpC";
    const ADMIN_EMAIL = "foovafoods@gmail.com";
    const ADMIN_PASS = "Foovafoods@@1113";

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_KEY);

    function log(msg, cls = "info") {
      const el = document.getElementById("log");
      el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
    }

    async function setup() {
      document.getElementById("log").innerHTML = "";
      log("Starting admin setup...");

      // Step 1: Sign up
      log("1. Creating user foovafoods@gmail.com...");
      const { data: signupData, error: signupErr } = await db.auth.signUp({
        email: ADMIN_EMAIL,
        password: ADMIN_PASS,
        options: { data: { full_name: "Foova Admin" } }
      });

      if (signupErr) {
        if (signupErr.message.includes("already registered")) {
          log("   User already exists — trying sign in...", "ok");
        } else {
          log("   Signup error: " + signupErr.message, "err");
          log("\n⚠️  If signup is disabled, go to Supabase Dashboard →", "err");
          log("   Authentication → Users → Add User manually.", "err");
          return;
        }
      } else {
        log("   User created! ID: " + (signupData.user?.id ?? "pending confirm"), "ok");
      }

      // Step 2: Sign in to get session
      log("2. Signing in...");
      const { data: session, error: signInErr } = await db.auth.signInWithPassword({
        email: ADMIN_EMAIL, password: ADMIN_PASS
      });

      if (signInErr) {
        log("   Sign in error: " + signInErr.message, "err");
        log("\n⚠️  The account may need email confirmation.", "err");
        log("   Go to Supabase Dashboard → Auth → Users → find the user → click '...' → Confirm email", "err");
        return;
      }

      const userId = session.user.id;
      log("   Signed in! User ID: " + userId, "ok");

      // Step 3: Insert admin role
      log("3. Assigning admin role...");
      const { error: roleErr } = await db.from("user_roles")
        .upsert({ user_id: userId, role: "admin" }, { onConflict: "user_id,role" });

      if (roleErr) {
        log("   Role error: " + roleErr.message, "err");
      } else {
        log("   Admin role assigned!", "ok");
      }

      // Step 4: Insert profile
      log("4. Creating profile...");
      const { error: profileErr } = await db.from("profiles")
        .upsert({ user_id: userId, full_name: "Foova Admin" }, { onConflict: "user_id" });

      if (profileErr) {
        log("   Profile error: " + profileErr.message, "err");
      } else {
        log("   Profile created!", "ok");
      }

      log("\n✅ DONE! Admin account ready.", "ok");
      log("Email:    foovafoods@gmail.com", "ok");
      log("Password: Fovafoods@@1113", "ok");
      log("\nGo to: http://localhost:8080/login and sign in!", "ok");
    }
  </script>
</body>

</html>
